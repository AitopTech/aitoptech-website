baseURL               = "https://aitoptech.github.io/aitoptech-website/"
languageCode          = "zh-CN"
title                 = "Aitop Tech"
theme                 = "WebStack-Hugo"
preserveTaxonomyNames = true
disablePathToLower    = true
hasCJKLanguage        = true
publishDir            = "public"

[params]
    author        = "shenweiyan"
    description   = "Webstack-Hugo 网址导航 | Hugo 主题 BY Bio IT 爱好者"
    upload        = "https://www.yuque.com/forms/share/1a1fee15-f7a9-4ee6-9dd4-b0ba9fef1871"
    about         = "https://github.com/shenweiyan/Knowledge-Garden/discussions/10"
    repository    = "https://github.com/shenweiyan/WebStack-Hugo"  
    enablePreLoad = true
    textPreLoad   = "AI创新方案加载中..."
    expandSidebar = false
    logosPath     = "assets/images/logos"
    defaultLogo   = "assets/images/logos/default.webp"
    nightMode     = false
    yiyan         = true
    fancybox      = true

[params.seo]    
    baiduhmid       = 'efccc04cb44fc49faddac5876180b369'
    baiduSiteVer    = 'codeva-cCAOSG8MBO'
    tj51laid        = ''
    tj51lack        = ''
    GoogleAdsClient = ''

[params.qweather]
    key = ""

[params.images]
    favicon           = "assets/images/AitopTech-en-favicon.png"
    searchImageL      = "assets/images/bg-dna.jpg"
    searchImageD      = "assets/images/bg-dna.jpg"
    logoExpandLight   = "assets/images/AitopTech-expand.png"
    logoExpandDark    = "assets/images/AitopTech-expand.png"
    logoCollapseLight = "assets/images/AitopTech-en.png"
    logoCollapseDark  = "assets/images/AitopTech-en.png"
    
[params.footer]
    copyright = '本站内容源自互联网,如有内容侵犯了你的权益,请联系删除相关内容,联系邮箱:neo.zhu@aitoptech.cn <br/>&copy; 2026 - {year} By Aitop Tech | <a href="https://beian.miit.gov.cn/" target="_blank">浙ICP备2026036362号-1</a><br/>'

[markup.goldmark.renderer]
    unsafe = true

[params.performance]
    enableLazyLoad = true
    enableMinify = true

[services.googleAnalytics]
    ID = ''

[sitemap]
    changefreq = "weekly"
    priority = 0.8
    filename = "sitemap.xml"

# 禁用RSS输出,避免email解析错误
[outputs]
    home = ["HTML"]
    page = ["HTML"]
    section = ["HTML"]
    taxonomy = ["HTML"]