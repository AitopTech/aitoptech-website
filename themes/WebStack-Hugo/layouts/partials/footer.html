<script>        
    $(document).ready(function(){
        setTimeout(function () {
            if ($('a.smooth[href="' + window.location.hash + '"]')[0]) {
                $('a.smooth[href="' + window.location.hash + '"]').click();
            }else if (window.location.hash != '') {
                // 页面加载后直接滚动到正确位置，避免闪烁
                var hashTarget = $(window.location.hash);
                if (hashTarget.length) {
                    var offsetTop = hashTarget.offset().top;
                    // 友情链接特殊处理
                    if (window.location.hash === '#friendlink') {
                        offsetTop = offsetTop - 70;
                    } else {
                        offsetTop = offsetTop - 130;
                    }
                    $("html, body").scrollTop(offsetTop);
                }
            }
        }, 100);
        
        $(document).on('click','a.sidebar-link',function(ev) {
            ev.preventDefault();
            var target = $(this).data('target');
            var currentPath = window.location.pathname;
            
            if (currentPath === '/' || currentPath === '') {
                if($('#sidebar').hasClass('show')){
                    $('#sidebar').modal('toggle');
                }
                
                $("html, body").animate({
                    scrollTop: $(target).offset().top - 130
                }, {
                    duration: 600,
                    easing: "swing"
                });
                
                var menu = $("a" + target);
                if(menu.length) {
                    menu.click();
                    toTarget(menu.parent().parent(), true, true);
                }
            } else {
                window.location.href = '/' + target;
            }
        });
        
        $(document).on('click','a.smooth',function(ev) {
            ev.preventDefault();
            var target = $(this).data('target') || $(this).attr('href');
            var currentPath = window.location.pathname;
            
            if (currentPath !== '/' && currentPath !== '') {
                window.location.href = '/' + target;
                return;
            }
            
            if($('#sidebar').hasClass('show') && !$(this).hasClass('change-href')){
                $('#sidebar').modal('toggle');
            }
            
            // 计算滚动位置，友情链接特殊处理
            var targetElement = $(target);
            var offsetTop = targetElement.offset().top;
            
            if (target === '#friendlink') {
                offsetTop = offsetTop - 70; // 友情链接滚动偏移
            } else {
                offsetTop = offsetTop - 130; // 其他锚点滚动偏移
            }
            
            $("html, body").animate({
                scrollTop: offsetTop
            }, {
                duration: 600,
                easing: "swing"
            });
            
            if($(this).hasClass('go-search-btn')){
                $('#search-text').focus();
            }
            if(!$(this).hasClass('change-href')){
                var menu =  $("a" + target);
                menu.click();
                toTarget(menu.parent().parent(),true,true);
            }
        });
        $(document).on('click','a.tab-noajax',function(ev) {
            var url = $(this).data('link');
            if(url)
                $(this).parents('.d-flex.flex-fill.flex-tab').children('.btn-move.tab-move').show().attr('href', url);
            else
                $(this).parents('.d-flex.flex-fill.flex-tab').children('.btn-move.tab-move').hide();
        });
        
    });
</script>

<script>
//夜间(日间)模式
(function(){
    if(document.cookie.replace(/(?:(?:^|.*;\s*)night\s*\=\s*([^;]*).*$)|^.*$/, "$1") === ''){
        if(new Date().getHours() > 22 || new Date().getHours() < 6){
            document.body.classList.remove('io-black-mode');
            document.body.classList.add('io-grey-mode');
            document.cookie = "night=1;path=/";
            console.log('夜间模式开启');
        }else{
            document.body.classList.remove('night');
            document.cookie = "night=0;path=/";
            console.log('夜间模式关闭');
        }
    }else{
        var night = document.cookie.replace(/(?:(?:^|.*;\s*)night\s*\=\s*([^;]*).*$)|^.*$/, "$1") || '0';
        if(night == '0'){
            document.body.classList.remove('night');
        }else if(night == '1'){
            document.body.classList.add('night');
        }
    }
})();
//夜间(日间)模式切换

// 全局联系弹窗功能
function showContactModal() {
    if (document.getElementById('globalContactModal')) {
        document.getElementById('globalContactModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
}

function closeContactModal() {
    if (document.getElementById('globalContactModal')) {
        document.getElementById('globalContactModal').style.display = 'none';
        document.body.style.overflow = '';
    }
}

// 点击弹窗外部关闭
document.addEventListener('click', function(e) {
    var modal = document.getElementById('globalContactModal');
    if (modal && e.target === modal) {
        closeContactModal();
    }
});

// ESC键关闭弹窗
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') {
        closeContactModal();
    }
});
</script>

<style>
