{{ partial "header.html" . }}

{{ partial "sidebar.html" . }}

{{ partial "content_header.html" . }}

<body class="page-body">
    <main role="main" class="main-content flex-fill">
        <div class="container">
            <div class="row">
                <div class="col-12">
                    <div class="content custom-page">
                        {{ .Content | markdownify | safeHTML }}
                    </div>
                </div>
            </div>
        </div>
    </main>

    <style>
        .content{font-size:14px;}
        .content a{color:#007bff;}
        .content a:hover{color:#f1404b;}
        .content h1,.content h2,.content h3,.content h4{margin: 15px 15px 15px 0px;}
        .content p{line-height:1.8;margin:15px 0;}
        .big-header-banner .page-header{background:gray;}
        img{max-width:100%;}
        
        .custom-page {
            padding: 30px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin: 20px 0;
        }
        .custom-page h1 {
            color: #333;
            border-bottom: 3px solid #007bff;
            padding-bottom: 15px;
            margin-bottom: 30px;
            font-size: 2em;
        }
        .custom-page h2 {
            color: #333;
            border-left: 4px solid #007bff;
            padding-left: 15px;
            margin-top: 40px;
            margin-bottom: 25px;
            font-size: 1.6em;
        }
        .custom-page h3 {
            color: #555;
            margin-top: 30px;
            margin-bottom: 15px;
            font-size: 1.3em;
        }
        .custom-page ul {
            line-height: 1.8;
            color: #666;
            padding-left: 20px;
            margin-bottom: 20px;
        }
        .custom-page li {
            margin-bottom: 8px;
        }
        .custom-page strong {
            color: #333;
            font-weight: 600;
        }
        .custom-page img {
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin: 15px 0;
            display: block;
        }
        .custom-page hr {
            border: none;
            border-top: 2px solid #eee;
            margin: 40px 0;
        }
    </style>

{{ partial "content_footer.html" . }}

{{ partial "modal_search.html" . }}

{{ partial "footer.html" . }}
